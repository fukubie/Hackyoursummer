<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hack Your Summer - Project Hub</title>
    <style>
        /* Neubrutalist Theme Palette Settings - Official Brand Blue Edition */
        :root {
            --bg-color: #f6f8fa;       /* Slate off-white canvas cream */
            --border-color: #111111;   /* Sharp solid black structural line */
            --accent-blue: #00d2ff;    /* Electric Cyan Blue highlight */
            --brand-blue: #0055ff;     /* Deep Civic Brand Blue */
            --panel-bg: #ffffff;       /* Card surfaces */
            --text-color: #111111;     /* High contrast charcoal */
            --shadow: 5px 5px 0px #111111;
            --active-shadow: 1px 1px 0px #111111;
        }

        body {
            margin: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        /* Fluid Layout Engine Container */
        .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 5vw;
            box-sizing: border-box;
        }

        .page-section {
            padding: 60px 0 90px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Global Neubrutalist Page Branding Header */
        .header-section {
            text-align: center;
            padding: 40px 0 10px 0;
        }

        .header-section h1 {
            font-size: clamp(2.5rem, 6vw, 4rem);
            font-weight: 900;
            margin: 0 0 15px 0;
            letter-spacing: -1px;
        }

        /* Neubrutalist Hand-Drawn Highlight Effect */
        .highlight {
            background: linear-gradient(180deg, transparent 65%, var(--accent-blue) 65%);
            display: inline-block;
            padding: 0 4px;
        }

        .header-section p {
            font-size: clamp(1.1rem, 2vw, 1.3rem);
            font-weight: 500;
            max-width: 600px;
            margin: 0 auto;
            line-height: 1.4;
        }

        /* Interface Switcher Pill Toggle */
        .toggle-wrapper {
            display: flex;
            justify-content: center;
            margin-bottom: 40px;
        }

        .toggle-container {
            display: flex;
            background: #ffffff;
            padding: 6px;
            border-radius: 50px;
            border: 3px solid var(--border-color);
            box-shadow: var(--shadow);
        }

        .toggle-btn {
            padding: 12px 28px;
            border: none;
            background: none;
            font-size: 1rem;
            font-weight: 800;
            cursor: pointer;
            border-radius: 40px;
            transition: all 0.15s ease;
        }

        .toggle-btn.active {
            background: var(--border-color);
            color: #ffffff;
        }

        /* Dynamic Panel Mechanics */
        .view-panel {
            display: none;
            width: 100%;
            max-width: 750px;
            margin: 0 auto;
        }

        .view-panel.active {
            display: block;
        }

        /* Form Card UI Components */
        .form-card {
            background: var(--panel-bg);
            border: 3px solid var(--border-color);
            border-radius: 16px;
            padding: 40px;
            box-shadow: var(--shadow);
            margin-bottom: 30px;
            box-sizing: border-box;
        }

        .section-header {
            margin-bottom: 30px;
            text-align: center;
        }

        .section-header h2 {
            font-size: 2rem;
            margin: 0 0 10px 0;
            font-weight: 900;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            font-weight: 800;
            font-size: 1rem;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-control {
            width: 100%;
            padding: 14px 18px;
            border: 3px solid var(--border-color);
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            box-sizing: border-box;
            background-color: #ffffff;
            transition: all 0.15s ease;
        }

        .form-control:focus {
            outline: none;
            box-shadow: var(--shadow);
            transform: translate(-2px, -2px);
        }

        textarea.form-control {
            resize: vertical;
            min-height: 120px;
        }

        .radio-group {
            display: flex;
            gap: 24px;
            margin-top: 8px;
        }

        .radio-label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-weight: 700;
        }

        .radio-label input {
            accent-color: var(--border-color);
            transform: scale(1.3);
        }

        /* Directory Search Bar Styling */
        .search-wrapper {
            margin-bottom: 35px;
            position: relative;
        }

        .search-control {
            border-radius: 50px;
            padding: 18px 26px;
            font-size: 1.15rem;
            box-shadow: var(--shadow);
        }

        /* Dynamic Directory Cards Grid */
        .directory-grid {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .idea-card {
            background: var(--panel-bg);
            border: 3px solid var(--border-color);
            border-radius: 14px;
            padding: 28px;
            box-shadow: var(--shadow);
            box-sizing: border-box;
        }

        .badge {
            display: inline-block;
            padding: 6px 14px;
            font-size: 0.8rem;
            font-weight: 800;
            border-radius: 30px;
            border: 2px solid var(--border-color);
            margin-bottom: 16px;
            text-transform: uppercase;
        }
        .badge-open { background: var(--brand-blue); color: #ffffff; }
        .badge-solo { background: #e0e0e0; color: #111111; }

        .idea-title {
            font-size: 1.5rem;
            font-weight: 900;
            margin: 0 0 10px 0;
            line-height: 1.2;
        }

        .idea-author {
            font-size: 0.95rem;
            color: #444;
            margin-bottom: 18px;
            border-bottom: 2px dashed #e0e0e0;
            padding-bottom: 12px;
        }

        .idea-body {
            font-size: 1.05rem;
            line-height: 1.5;
            margin-bottom: 18px;
            white-space: pre-wrap;
        }

        .meta-details {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            font-size: 0.9rem;
            font-weight: 700;
        }

        .meta-item code {
            background: #eef1f6;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: monospace;
        }

        .meta-item a {
            color: var(--text-color);
            text-decoration: underline;
            text-underline-offset: 3px;
        }

        /* Action Buttons */
        .btn-submit {
            display: block;
            width: 100%;
            padding: 16px;
            background-color: var(--accent-blue);
            color: var(--text-color);
            border: 3px solid var(--border-color);
            border-radius: 10px;
            font-size: 1.15rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            box-shadow: var(--shadow);
            transition: all 0.15s ease;
            margin-top: 30px;
            box-sizing: border-box;
        }

        .btn-submit:hover {
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0px var(--border-color);
        }

        .btn-submit:active {
            transform: translate(2px, 2px);
            box-shadow: var(--active-shadow);
        }

        .btn-secondary {
            background-color: #ffffff;
            margin-top: 20px;
        }

        /* Notifications response feedback styles */
        .status-msg {
            padding: 16px;
            border-radius: 10px;
            margin-top: 25px;
            font-weight: 700;
            text-align: center;
            display: none;
            border: 3px solid var(--border-color);
            box-shadow: var(--shadow);
        }
        .status-success { background-color: #e6f4ea; color: #137333; }
        .status-error { background-color: #fce8e6; color: #c5221f; }
        
        .loading-state {
            text-align: center;
            font-size: 1.25rem;
            font-weight: 800;
            padding: 40px;
            color: #666;
        }
    </style>
</head>
<body>

    <main id="page" class="container" role="main">
        <article class="sections" id="sections">
            
            <header class="header-section">
                <h1>Hack Your <span class="highlight">Summer</span></h1>
                <p>A structured, free 4-week sprint for college students and recent grads to build something real.</p>
            </header>

            <section class="page-section">
                
                <div class="toggle-wrapper">
                    <div class="toggle-container">
                        <button class="toggle-btn active" id="toggleSubmit" onclick="switchMode('submit')">Submit an Idea</button>
                        <button class="toggle-btn" id="toggleBrowse" onclick="switchMode('browse')">Browse Directory</button>
                    </div>
                </div>

                <div id="submitPanel" class="view-panel active">
                    <div class="form-card">
                        <div class="section-header">
                            <h2>Join the Directory</h2>
                            <p>Submit your project idea and find potential summer collaborators.</p>
                        </div>
                        
                        <form id="sheetSubmissionForm">
                            <div class="form-group">
                                <label for="name">Name</label>
                                <input type="text" id="name" class="form-control" placeholder="Michelle Khare" required>
                            </div>

                            <div class="form-group">
                                <label for="contact">Contact Information</label>
                                <input type="text" id="contact" class="form-control" placeholder="michelle@challenge.com" required>
                            </div>

                            <div class="form-group">
                                <label for="projectIdea">Project Idea</label>
                                <textarea id="projectIdea" class="form-control" placeholder="What are you building over the 4-week sprint cycle?" required></textarea>
                            </div>

                            <div class="form-group">
                                <label>Open to Collaboration?</label>
                                <div class="radio-group">
                                    <label class="radio-label"><input type="radio" name="collaboration" value="Y" checked> Yes, looking for a team</label>
                                    <label class="radio-label"><input type="radio" name="collaboration" value="N"> No, working solo</label>
                                </div>
                            </div>

                            <div class="form-group">
                                <label for="linkedin">LinkedIn Profile</label>
                                <input type="url" id="linkedin" class="form-control" placeholder="https://linkedin.com/in/username">
                            </div>

                            <div class="form-group">
                                <label for="needs">Project/mentor needs</label>
                                <textarea id="needs" class="form-control" placeholder="What tech stacks, public policy guides, or hardware engineering support do you need?"></textarea>
                            </div>

                            <div class="form-group">
                                <label for="discord">Discord Name</label>
                                <input type="text" id="discord" class="form-control" placeholder="username" required>
                            </div>

                            <button type="submit" id="submitBtn" class="btn-submit">Submit Details →</button>
                            <div id="statusMessage" class="status-msg"></div>
                        </form>
                    </div>
                </div>

                <div id="browsePanel" class="view-panel">
                    <div class="search-wrapper">
                        <input type="text" id="directorySearch" class="form-control search-control" placeholder="🔍 Search components, developers, stack requirements...">
                    </div>
                    
                    <div id="directoryLoading" class="loading-state">Syncing live registry database...</div>
                    <div id="directoryEntries" class="directory-grid"></div>
                </div>

            </section>

        </article>
    </main>

    <script>
        // Global State Tracking Variables
        let currentPage = 1;
        let currentSearch = "";
        let isFetching = false;
        let searchDebounceTimer;
        
        // Ensure your deployment link goes here
        const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbwGaa20fGaTv0mQ_ZSKRIduF150ymgvLmphCGeJghIQCMQ3EJJWdzU0jA51WT1DEuZh/exec';

        function switchMode(targetMode) {
            const submitBtnElement = document.getElementById('toggleSubmit');
            const browseBtnElement = document.getElementById('toggleBrowse');
            const submitPanel = document.getElementById('submitPanel');
            const browsePanel = document.getElementById('browsePanel');

            if (targetMode === 'submit') {
                submitBtnElement.classList.add('active');
                browseBtnElement.classList.remove('active');
                submitPanel.classList.add('active');
                browsePanel.classList.remove('active');
            } else {
                browseBtnElement.classList.add('active');
                submitBtnElement.classList.remove('active');
                browsePanel.classList.add('active');
                submitPanel.classList.remove('active');
                
                // Reset and trigger fresh optimized fetch
                currentPage = 1;
                document.getElementById('directoryEntries').innerHTML = "";
                fetchDirectoryEntries();
            }
        }

        const form = document.getElementById('sheetSubmissionForm');
        const submitBtn = document.getElementById('submitBtn');
        const statusMessage = document.getElementById('statusMessage');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            submitBtn.disabled = true;
            submitBtn.innerText = 'Processing Entry...';
            statusMessage.style.display = 'none';

            // FORMAT: URLSearchParams structures data securely for the server-side parameter parse
            const formData = new URLSearchParams();
            formData.append('name', document.getElementById('name').value);
            formData.append('contact', document.getElementById('contact').value);
            formData.append('projectIdea', document.getElementById('projectIdea').value);
            formData.append('collaboration', document.querySelector('input[name="collaboration"]:checked').value);
            formData.append('linkedin', document.getElementById('linkedin').value);
            formData.append('needs', document.getElementById('needs').value);
            formData.append('discord', document.getElementById('discord').value);

            try {
                await fetch(WEB_APP_URL, {
                    method: 'POST',
                    mode: 'no-cors', 
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formData
                });

                statusMessage.className = 'status-msg status-success';
                statusMessage.innerText = 'Success! Your project entry has been uploaded to the sheet registry directory.';
                statusMessage.style.display = 'block';
                form.reset();
            } catch (err) {
                statusMessage.className = 'status-msg status-error';
                statusMessage.innerText = 'An error occurred during submission.';
                statusMessage.style.display = 'block';
                console.error(err);
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = 'Submit Details →';
            }
        });

        // Optimized Async Server-Side Pull Engine
        async function fetchDirectoryEntries(append = false) {
            if (isFetching) return;
            isFetching = true;
            
            const loader = document.getElementById('directoryLoading');
            const container = document.getElementById('directoryEntries');
            loader.style.display = 'block';

            try {
                const url = `${WEB_APP_URL}?page=${currentPage}&limit=20&q=${encodeURIComponent(currentSearch)}`;
                const response = await fetch(url);
                const payload = await response.json();
                
                if (payload.result === 'success') {
                    renderDirectory(payload.data, append);
                    manageLoadMoreButton(payload.hasMore);
                } else {
                    container.innerHTML = `<div class="loading-state" style="color:#c5221f;">Could not sync directory rows.</div>`;
                }
            } catch (error) {
                container.innerHTML = `<div class="loading-state" style="color:#c5221f;">Network sync layer down.</div>`;
                console.error(error);
            } finally {
                loader.style.display = 'none';
                isFetching = false;
            }
        }

        // Render DOM Fragment Engine
        function renderDirectory(records, append) {
            const container = document.getElementById('directoryEntries');
            
            if (records.length === 0 && !append) {
                container.innerHTML = `<div class="loading-state">No matching projects found. Be the first to launch one!</div>`;
                return;
            }

            const htmlContent = records.map(item => {
                const isOpen = item.collaboration === 'Y';
                const badgeClass = isOpen ? 'badge-open' : 'badge-solo';
                const badgeText = isOpen ? '🤝 Open for Collaboration' : '🔒 Working Solo';
                
                return `
                    <div class="idea-card">
                        <span class="badge ${badgeClass}">${badgeText}</span>
                        <h3 class="idea-title">${escapeHTML(item.projectIdea.split('\n')[0].substring(0, 80))}...</h3>
                        <div class="idea-author">By <strong>${escapeHTML(item.name)}</strong> — Contact: <code>${escapeHTML(item.contact)}</code></div>
                        <p class="idea-body">${escapeHTML(item.projectIdea)}</p>
                        ${item.needs ? `<p class="idea-body"><strong>Needs / Stack Requirements:</strong> ${escapeHTML(item.needs)}</p>` : ''}
                        <div class="meta-details">
                            <div class="meta-item">🎮 Discord: <code>${escapeHTML(item.discord)}</code></div>
                            ${item.linkedin ? `<div class="meta-item">🔗 <a href="${escapeHTML(item.linkedin)}" target="_blank">LinkedIn Profile</a></div>` : ''}
                        </div>
                    </div>
                `;
            }).join('');

            if (append) {
                container.insertAdjacentHTML('beforeend', htmlContent);
            } else {
                container.innerHTML = htmlContent;
            }
        }

        // Manage Load More Component Context
        function manageLoadMoreButton(hasMore) {
            let loadMoreBtn = document.getElementById('loadMoreBtn');
            
            if (!loadMoreBtn) {
                const btnHtml = `<button id="loadMoreBtn" class="btn-submit btn-secondary">Load More Entries ↓</button>`;
                document.getElementById('browsePanel').insertAdjacentHTML('beforeend', btnHtml);
                loadMoreBtn = document.getElementById('loadMoreBtn');
                loadMoreBtn.addEventListener('click', () => {
                    currentPage++;
                    fetchDirectoryEntries(true);
                });
            }
            
            loadMoreBtn.style.display = hasMore ? 'block' : 'none';
        }

        // Debounced Search Listener Optimization
        document.getElementById('directorySearch').addEventListener('input', (e) => {
            clearTimeout(searchDebounceTimer);
            searchDebounceTimer = setTimeout(() => {
                currentSearch = e.target.value.toLowerCase().trim();
                currentPage = 1;
                fetchDirectoryEntries(false);
            }, 300);
        });

        // XSS Sanitizer Helper
        function escapeHTML(str) {
            if(!str) return '';
            return str.replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag));
        }
    </script>
</body>
</html>
